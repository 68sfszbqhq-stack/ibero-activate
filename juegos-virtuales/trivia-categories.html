<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia de Categorías - Jeopardy Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../js/firebase-config.js"></script>
    
    <!-- QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary: #003366; /* Deep Blue Jeopardy Style */
            --accent: #FFD700; /* Gold */
            --danger: #E3000F;
            --success: #10b981;
            --bg-color: #002244;
            --card-bg: #ffffff;
            --text-main: #ffffff;
            --text-dark: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; overflow-x: hidden; }
        
        .header { text-align: center; margin-bottom: 1.5rem; margin-top: 1rem; }
        .header h1 { font-size: 3.5rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; text-shadow: 4px 4px 0px rgba(0,0,0,0.5); }
        
        .screen { display: none; width: 100%; max-width: 1200px; animation: fadeIn 0.5s ease; }
        .screen.active { display: block; }

        /* ROLE SELECTION */
        .container-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; border: 2px solid rgba(255,255,255,0.2); padding: 2rem; margin-bottom: 1.5rem; width: 100%; max-width: 600px; text-align: center; }
        .btn-role { background: var(--accent); color: var(--text-dark); border: none; padding: 1.5rem; font-size: 1.5rem; font-weight: 800; border-radius: 15px; cursor: pointer; width: 100%; margin-bottom: 1rem; transition: transform 0.2s; }
        .btn-role:hover { transform: scale(1.05); }

        /* PLAYER SCREEN */
        .buzzer-btn { width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); border: 12px solid #800000; color: white; font-size: 2.5rem; font-weight: 900; cursor: pointer; box-shadow: 0 15px 40px rgba(255,0,0,0.4), 0 5px 0 #600000; transition: all 0.1s; display: flex; align-items: center; justify-content: center; user-select: none; margin: 2rem auto; }
        .buzzer-btn:active { transform: scale(0.95) translateY(5px); box-shadow: 0 5px 15px rgba(255,0,0,0.2), 0 1px 0 #600000; }
        .buzzer-btn:disabled { background: #666; border-color: #444; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
        
        /* HOST BOARD */
        .board-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; width: 100%; margin-top: 1rem; }
        .category-header { background: #004488; color: var(--accent); font-weight: 900; font-size: 1.2rem; padding: 15px; text-align: center; border: 3px solid #0055aa; border-radius: 10px; text-transform: uppercase; height: 80px; display: flex; align-items: center; justify-content: center; }
        .trivia-card { background: #003366; color: var(--accent); font-weight: 900; font-size: 2.5rem; padding: 20px; text-align: center; border: 3px solid #0055aa; border-radius: 10px; cursor: pointer; height: 120px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .trivia-card:hover { background: #004488; border-color: var(--accent); transform: scale(1.05); z-index: 2; }
        .trivia-card.spent { color: rgba(255,215,0,0.2); background: rgba(0,0,0,0.2); cursor: default; border-color: transparent; }

        /* MODAL PREGUNTA */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,20,40,0.95); z-index: 100; align-items: center; justify-content: center; flex-direction: column; padding: 40px; }
        .modal.active { display: flex; }
        .modal-content { max-width: 900px; text-align: center; }
        .modal-question { font-size: 3.5rem; font-weight: 800; margin-bottom: 2rem; line-height: 1.2; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .modal-answer { font-size: 2rem; color: var(--accent); margin-top: 2rem; display: none; }

        /* SCORE PANEL */
        .score-row { display: flex; gap: 2rem; margin-top: 2rem; width: 100%; justify-content: center; }
        .score-box { background: rgba(0,0,0,0.3); border: 3px solid #0055aa; padding: 1.5rem; border-radius: 15px; text-align: center; min-width: 200px; }
        .score-box h3 { font-size: 1.2rem; color: rgba(255,255,255,0.7); margin-bottom: 0.5rem; }
        .score-box .points { font-size: 3.5rem; font-weight: 900; color: var(--accent); }

        /* BUZZER QUEUE */
        .buzzer-list { margin-top: 1rem; width: 100%; max-width: 400px; }
        .buzzer-item { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 10px; margin-bottom: 8px; font-weight: 800; display: flex; align-items: center; gap: 10px; border-left: 5px solid transparent; }
        .buzzer-item.team-1 { border-left-color: var(--danger); }
        .buzzer-item.team-2 { border-left-color: #3b82f6; }

        .btn { border: none; padding: 0.8rem 1.5rem; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-close { background: #666; color: white; margin-top: 2rem; }
        .btn-correct { background: var(--success); color: white; }
        .btn-wrong { background: var(--danger); color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* QR & SETUP */
        .setup-row { display: flex; gap: 2rem; align-items: flex-start; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
        .qr-card { background: white; padding: 1.5rem; border-radius: 15px; color: var(--text-dark); text-align: center; }
        
        .overlay-lock { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 10; border-radius: 20px; align-items: center; justify-content: center; flex-direction: column; }

    </style>
</head>
<body>

    <div class="header">
        <h1>TRIVIA DE CATEGORÍAS</h1>
    </div>

    <!-- PANTALLA INICIAL -->
    <div id="screen-role" class="screen active">
        <div class="container-box" style="margin: 0 auto;">
            <button class="btn-role" onclick="initHost()">SOY LOCUTOR (Panel Maestro)</button>
            <button class="btn-role" style="background: #eee;" onclick="initPlayer()">SOY JUGADOR (Buzzer)</button>
        </div>
    </div>

    <!-- PANTALLA JUGADOR -->
    <div id="screen-player" class="screen">
        <div class="container-box" style="margin: 0 auto; position: relative;">
            <div id="setup-player">
                <h2 style="margin-bottom: 1.5rem;">Configura tu equipo</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
                    <button class="btn" style="flex:1; background: var(--danger); color: white;" onclick="setTeam(1)" id="team1-btn">EQUIPO 1</button>
                    <button class="btn" style="flex:1; background: #3b82f6; color: white;" onclick="setTeam(2)" id="team2-btn">EQUIPO 2</button>
                </div>
                <input type="text" id="playerName" class="btn" style="width: 100%; background: white; color: var(--text-dark); margin-bottom: 1.5rem;" placeholder="Tu Nombre">
                <button class="btn-role" onclick="startPlaying()">ENTRAR AL JUEGO</button>
            </div>
            <div id="buzzer-area" style="display:none;">
                <p id="player-info" style="font-weight: 800; font-size: 1.2rem; margin-bottom: 1rem; color: var(--accent);"></p>
                <button class="buzzer-btn" id="main-buzzer" onclick="pressBuzzer()">BUZZ!</button>
                <p id="buzzer-status" style="margin-top: 1rem; font-weight: 600;">Espera la pregunta...</p>
            </div>
            <div class="overlay-lock" id="lock-overlay">
                <i class="fa-solid fa-lock" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h2>Buzzer Bloqueado</h2>
            </div>
        </div>
    </div>

    <!-- PANTALLA LOCUTOR -->
    <div id="screen-host" class="screen">
        <div class="setup-row">
            <div class="qr-card">
                <p style="font-weight: 800; margin-bottom: 10px;">ESCANEEN PARA EL BUZZER</p>
                <div id="qrcode"></div>
            </div>
            <div style="flex: 1; min-width: 300px;">
                <div class="score-row" style="margin-top: 0;">
                    <div class="score-box" style="border-color: var(--danger);">
                        <h3>EQUIPO 1</h3>
                        <div class="points" id="score-1">0</div>
                    </div>
                    <div class="score-box" style="border-color: #3b82f6;">
                        <h3>EQUIPO 2</h3>
                        <div class="points" id="score-2">0</div>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 1rem;">
                    <button class="btn" style="background: #666; color: white;" onclick="resetGame()">REINICIAR TODO EL TABLERO</button>
                </div>
            </div>
        </div>

        <div class="board-grid" id="trivia-board">
            <!-- Categorías y tarjetas se generan por JS -->
        </div>
    </div>

    <!-- MODAL DE PREGUNTA -->
    <div class="modal" id="question-modal">
        <div class="modal-content">
            <div id="modal-category" style="color: var(--accent); font-weight: 800; font-size: 1.5rem; margin-bottom: 1rem;">CATEGORÍA</div>
            <div class="modal-question" id="modal-q-text">¿Cuál es la capital de Francia?</div>
            <div class="modal-answer" id="modal-a-text">Respuesta: PARÍS</div>
            
            <div id="host-controls" style="margin-top: 2rem;">
                <div style="font-weight: 800; margin-bottom: 1rem;">COLA DE BUZZER:</div>
                <div id="buzzer-queue" class="buzzer-list" style="margin: 0 auto 1.5rem auto;"></div>
                
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-correct" onclick="awardPoints(true)">CORRECTO</button>
                    <button class="btn btn-wrong" onclick="awardPoints(false)">INCORRECTO</button>
                </div>
                <button class="btn btn-close" onclick="closeQuestion()">CERRAR / VOLVER AL TABLERO</button>
            </div>
        </div>
    </div>

    <script>
        const COLLECTION_NAME = "trivia_jep_session";
        let db = firebase.firestore();
        let userTeam = 0;
        let userName = "";
        let currentQuestion = null;
        let qrCodeObj = null;

        const TRIVIA_DATA = [
            {
                category: "CIENCIA",
                questions: [
                    { q: "¿Cuántos planetas hay en el sistema solar?", a: "8 planetas", v: 100 },
                    { q: "¿Cuál es el elemento químico más abundante en el universo?", a: "Hidrógeno", v: 200 },
                    { q: "¿Qué nombre recibe el proceso por el cual las plantas fabrican su alimento?", a: "Fotosíntesis", v: 300 },
                    { q: "¿Quién propuso la Teoría de la Relatividad?", a: "Albert Einstein", v: 400 },
                    { q: "¿A qué temperatura el agua se convierte en vapor al nivel del mar?", a: "100°C", v: 500 }
                ]
            },
            {
                category: "GODÍNEZ",
                questions: [
                    { q: "¿Cómo se le llama popularmente a la comida recalentada en tupper?", a: "El recalentado / El itacate", v: 100 },
                    { q: "¿Qué día de la semana es conocido por ser el 'Día del tupper vacío'?", a: "Jueves o Viernes", v: 200 },
                    { q: "¿Qué significa la sigla ASAP en la oficina?", a: "As Soon As Possible (Lo antes posible)", v: 300 },
                    { q: "¿Cómo se llama la junta que se hace al final del día 'solo por 5 minutos'?", a: "Bomberazo", v: 400 },
                    { q: "Frase típica: '¿Te encargo esto para el lunes a primera hora?', ¿Cuándo se dice?", a: "Viernes a las 5:59 PM", v: 500 }
                ]
            },
            {
                category: "CINE & TV",
                questions: [
                    { q: "¿Quién es el protagonista de 'The Big Bang Theory' obsesionado con el orden?", a: "Sheldon Cooper", v: 100 },
                    { q: "¿En qué serie aparece el personaje Walter White?", a: "Breaking Bad", v: 200 },
                    { q: "¿Cuál es la película más taquillera de la historia (sin ajuste de inflación)?", a: "Avatar", v: 300 },
                    { q: "¿Cómo se llama el actor que interpreta a Iron Man?", a: "Robert Downey Jr.", v: 400 },
                    { q: "¿Qué película ganó el primer Oscar a Mejor Película Animada?", a: "Shrek", v: 500 }
                ]
            },
            {
                category: "CULTURA",
                questions: [
                    { q: "¿Quién pintó la Mona Lisa?", a: "Leonardo da Vinci", v: 100 },
                    { q: "¿En qué país se encuentran las pirámides de Giza?", a: "Egipto", v: 200 },
                    { q: "¿Cuál es el río más largo del mundo?", a: "Río Amazonas", v: 300 },
                    { q: "¿En qué año terminó la Segunda Guerra Mundial?", a: "1945", v: 400 },
                    { q: "¿Quién escribió 'Don Quijote de la Mancha'?", a: "Miguel de Cervantes", v: 500 }
                ]
            },
            {
                category: "MÉXICO",
                questions: [
                    { q: "¿Cuál es el deporte nacional de México?", a: "La Charrería", v: 100 },
                    { q: "¿En qué estado se encuentra la ciudad de Cancún?", a: "Quintana Roo", v: 200 },
                    { q: "¿Quién es el 'Cura de Dolores' que dio el grito de independencia?", a: "Miguel Hidalgo", v: 300 },
                    { q: "¿Cuál es la comida típica hecha con tortillas, salsa y queso que se desayuna?", a: "Chilaquiles", v: 400 },
                    { q: "¿Qué civilización construyó la ciudad de Chichén Itzá?", a: "Los Mayas", v: 500 }
                ]
            }
        ];

        // --- INICIO ---
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role');
            if (role === 'host') initHost();
            else if (role === 'player') initPlayer();
        };

        function initHost() {
            showScreen('host');
            generateBoard();
            startHostSync();
            
            // QR Code
            const qrContainer = document.getElementById('qrcode');
            if (!qrCodeObj && qrContainer) {
                const playerUrl = window.location.origin + window.location.pathname + "?role=player";
                qrCodeObj = new QRCode(qrContainer, { text: playerUrl, width: 150, height: 150 });
            }
        }

        function initPlayer() {
            showScreen('player');
            const savedName = localStorage.getItem('trivia_player_name');
            if (savedName) document.getElementById('playerName').value = savedName;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        // --- LÓGICA JUGADOR ---
        function setTeam(t) {
            userTeam = t;
            document.getElementById('team1-btn').style.border = t === 1 ? '4px solid white' : 'none';
            document.getElementById('team2-btn').style.border = t === 2 ? '4px solid white' : 'none';
        }

        function startPlaying() {
            userName = document.getElementById('playerName').value.trim();
            if (!userName || !userTeam) return alert("Elige equipo y nombre");
            localStorage.setItem('trivia_player_name', userName);
            
            document.getElementById('setup-player').style.display = 'none';
            document.getElementById('buzzer-area').style.display = 'block';
            document.getElementById('player-info').innerText = `Eq ${userTeam} - ${userName}`;
            
            startPlayerSync();
        }

        async function pressBuzzer() {
            const btn = document.getElementById('main-buzzer');
            btn.disabled = true;
            document.getElementById('buzzer-status').innerText = "¡BUZZ ENVIADO!";
            
            await db.collection(COLLECTION_NAME).doc('game_state').collection('buzzers').add({
                name: userName,
                team: userTeam,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function startPlayerSync() {
            db.collection(COLLECTION_NAME).doc('game_state').onSnapshot(doc => {
                const state = doc.data() || {};
                const lock = document.getElementById('lock-overlay');
                if (state.locked) {
                    lock.style.display = 'flex';
                } else {
                    lock.style.display = 'none';
                    document.getElementById('main-buzzer').disabled = false;
                    document.getElementById('buzzer-status').innerText = "¡PREPÁRATE!";
                }
            });
        }

        // --- LÓGICA LOCUTOR ---
        function generateBoard() {
            const board = document.getElementById('trivia-board');
            board.innerHTML = '';
            
            // Headers
            TRIVIA_DATA.forEach(cat => {
                const h = document.createElement('div');
                h.className = 'category-header';
                h.innerText = cat.category;
                board.appendChild(h);
            });

            // Questions (Rows)
            for (let i = 0; i < 5; i++) {
                TRIVIA_DATA.forEach((cat, catIdx) => {
                    const q = cat.questions[i];
                    const card = document.createElement('div');
                    card.className = 'trivia-card';
                    card.id = `q-${catIdx}-${i}`;
                    card.innerText = q.v;
                    card.onclick = () => openQuestion(catIdx, i);
                    board.appendChild(card);
                });
            }
        }

        async function openQuestion(catIdx, qIdx) {
            const card = document.getElementById(`q-${catIdx}-${qIdx}`);
            if (card.classList.contains('spent')) return;

            const q = TRIVIA_DATA[catIdx].questions[qIdx];
            currentQuestion = { ...q, id: `q-${catIdx}-${qIdx}` };
            
            document.getElementById('modal-category').innerText = TRIVIA_DATA[catIdx].category;
            document.getElementById('modal-q-text').innerText = q.q;
            document.getElementById('modal-a-text').innerText = "Respuesta: " + q.a;
            document.getElementById('modal-a-text').style.display = 'none';
            document.getElementById('question-modal').classList.add('active');
            
            // Limpiar buzzers previos y abrir
            await clearBuzzers();
            await db.collection(COLLECTION_NAME).doc('game_state').set({ locked: false, spent: firebase.firestore.FieldValue.arrayUnion(currentQuestion.id) }, { merge: true });
        }

        async function closeQuestion() {
            document.getElementById('question-modal').classList.remove('active');
            await db.collection(COLLECTION_NAME).doc('game_state').update({ locked: true });
        }

        async function clearBuzzers() {
            const batch = db.batch();
            const snap = await db.collection(COLLECTION_NAME).doc('game_state').collection('buzzers').get();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        }

        function startHostSync() {
            // Escuchar buzzers
            db.collection(COLLECTION_NAME).doc('game_state').collection('buzzers').orderBy('timestamp').onSnapshot(snap => {
                const list = document.getElementById('buzzer-queue');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const b = doc.data();
                    const item = document.createElement('div');
                    item.className = `buzzer-item team-${b.team}`;
                    item.innerText = `${b.name} (EQ ${b.team})`;
                    list.appendChild(item);
                });
            });

            // Escuchar estado (Tarjetas usadas y puntaje)
            db.collection(COLLECTION_NAME).doc('game_state').onSnapshot(doc => {
                const data = doc.data() || {};
                
                // Marcar gastadas
                if (data.spent) {
                    data.spent.forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.classList.add('spent');
                    });
                }
                
                // Puntajes
                document.getElementById('score-1').innerText = data.score1 || 0;
                document.getElementById('score-2').innerText = data.score2 || 0;
            });
        }

        async function awardPoints(correct) {
            // Mostrar respuesta
            document.getElementById('modal-a-text').style.display = 'block';
            
            if (correct) {
                // Obtener quién buzzeó primero
                const snap = await db.collection(COLLECTION_NAME).doc('game_state').collection('buzzers').orderBy('timestamp').limit(1).get();
                if (snap.empty) return alert("Nadie ha buzzeado");
                
                const winner = snap.docs[0].data();
                const scoreField = winner.team === 1 ? 'score1' : 'score2';
                
                const stateDoc = await db.collection(COLLECTION_NAME).doc('game_state').get();
                const currentScore = stateDoc.data()[scoreField] || 0;
                
                await db.collection(COLLECTION_NAME).doc('game_state').update({
                    [scoreField]: currentScore + currentQuestion.v,
                    locked: true
                });
                alert(`Puntos para Equipo ${winner.team}`);
            } else {
                await db.collection(COLLECTION_NAME).doc('game_state').update({ locked: false });
                await clearBuzzers();
                alert("Incorrecto. Buzzer re-abierto.");
            }
        }

        async function resetGame() {
            if (!confirm("¿Reiniciar todo el tablero y puntos?")) return;
            await db.collection(COLLECTION_NAME).doc('game_state').set({
                score1: 0,
                score2: 0,
                spent: [],
                locked: true
            });
            generateBoard();
        }
    </script>
</body>
</html>
